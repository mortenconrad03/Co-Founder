const SUPABASE_URL = "https://eixntbgjxxtppoguwuab.supabase.co";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ═══════════════════════════════════════════════════════════════
// AI FETCH WRAPPER (handles rate limit 429)
// ═══════════════════════════════════════════════════════════════
async function aiFetch(url, opts) {
  var resp = await fetch(url, opts);
  if (resp.status === 429) {
    var data = {};
    try { data = await resp.clone().json(); } catch(e) {}
    window.dispatchEvent(new CustomEvent("rate-limit-hit", { detail: data }));
    throw new Error(data.error || "Tageslimit erreicht (15 Generierungen/Tag). Versuche es morgen wieder.");
  }
  return resp;
}

// ═══════════════════════════════════════════════════════════════
// AUTH CONTEXT
// ═══════════════════════════════════════════════════════════════

const AuthContext = createContext(null);

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(function() {
    supabase.auth.getSession().then(function(res) {
      setUser(res.data.session?.user || null);
      setLoading(false);
    });
    const { data: listener } = supabase.auth.onAuthStateChange(function(_event, session) {
      setUser(session?.user || null);
    });
    return function() { listener.subscription.unsubscribe(); };
  }, []);

  return React.createElement(AuthContext.Provider, { value: { user, loading, supabase } }, children);
}

function useAuth() {
  return useContext(AuthContext);
}

const db = {
  async saveOnboarding(userId, data) {
    const allowedKeys = ["vorname","nachname","pitch","problem","zielgruppe","phase","bundesland","branche","kapitalbedarf","teamgroesse","investoren","foerderungen","businessplan","finanzplan","konkurrenz","preis","rechtsform","ziele","onboarding_complete"];
    const row = { onboarding_complete: true, updated_at: new Date().toISOString() };
    allowedKeys.forEach(function(k) { if (data[k] !== undefined) row[k] = data[k]; });
    const { error } = await supabase.from("profiles").update(row).eq("id", userId);
    if (error) console.error("saveOnboarding error:", error);
    return !error;
  },

  async getOnboarding(userId) {
    const { data, error } = await supabase.from("profiles").select("*").eq("id", userId).single();
    if (error && error.code !== "PGRST116") console.error("getOnboarding error:", error);
    return data;
  },

  async getCompletedTasks(userId) {
    const { data, error } = await supabase.from("roadmap_progress").select("task_id").eq("user_id", userId);
    if (error) console.error("getCompletedTasks error:", error);
    const map = {};
    if (data) data.forEach(function(r) { map[r.task_id] = true; });
    return map;
  },

  async toggleTask(userId, taskId, completed) {
    if (completed) {
      const { error } = await supabase.from("roadmap_progress").upsert({ user_id: userId, task_id: taskId }, { onConflict: "user_id,task_id" });
      if (error) console.error("toggleTask insert error:", error);
    } else {
      const { error } = await supabase.from("roadmap_progress").delete().eq("user_id", userId).eq("task_id", taskId);
      if (error) console.error("toggleTask delete error:", error);
    }
  },

  async saveAiRoadmap(userId, tasks) {
    // Delete old roadmap, then insert new
    await supabase.from("ai_roadmap").delete().eq("user_id", userId);
    const rows = tasks.map(function(t, i) {
      return { user_id: userId, task_index: i, task_id: t.id, week: t.week, category: t.category, title: t.title, description: t.description, priority: t.priority, effort: t.effort, link: t.link };
    });
    const { error } = await supabase.from("ai_roadmap").insert(rows);
    if (error) console.error("saveAiRoadmap error:", error);
    return !error;
  },

  async getAiRoadmap(userId) {
    const { data, error } = await supabase.from("ai_roadmap").select("*").eq("user_id", userId).order("task_index");
    if (error) console.error("getAiRoadmap error:", error);
    if (data && data.length > 0) return data.map(function(r) { return { id: r.task_id, week: r.week, category: r.category, title: r.title, description: r.description, priority: r.priority, effort: r.effort, link: r.link }; });
    return null;
  },

    }).select().single();
    if (error) console.error("saveCustomTask error:", error);
    return data;

    const { data, error } = await supabase.from("custom_tasks").select("*").eq("user_id", userId).order("created_at");

    return [];
  },

    const { error } = await supabase.from("custom_tasks").delete().eq("user_id", userId).eq("task_id", taskId);
    if (error) console.error("deleteCustomTask error:", error);
    // Also remove from roadmap_progress
    await supabase.from("roadmap_progress").delete().eq("user_id", userId).eq("task_id", taskId);

  async uploadDocument(userId, file, docTypeId) {
    const path = userId + "/" + Date.now() + "_" + file.name;
    const { error: uploadError } = await supabase.storage.from("documents").upload(path, file);
    if (uploadError) { console.error("upload error:", uploadError); return null; }
    const { error: dbError } = await supabase.from("documents").insert({
      user_id: userId, doc_type_id: docTypeId || "custom",
      file_name: file.name, file_size: file.size, file_path: path
    });
    if (dbError) console.error("doc insert error:", dbError);
    return path;
  },

  async getDocuments(userId) {
    const { data, error } = await supabase.from("documents").select("*").eq("user_id", userId).order("uploaded_at", { ascending: false });
    if (error) console.error("getDocuments error:", error);
    return data || [];
  },

  async deleteDocument(userId, docId, storagePath) {
    await supabase.storage.from("documents").remove([storagePath]);
    const { error } = await supabase.from("documents").delete().eq("id", docId).eq("user_id", userId);
    if (error) console.error("deleteDocument error:", error);
  },

  async getDocumentUrl(storagePath) {
    const { data } = await supabase.storage.from("documents").createSignedUrl(storagePath, 3600);
    return data?.signedUrl;
  },

  async getFoerderprogramme(onboardingData) {
    let query = supabase.from("foerderprogramme").select("*").eq("aktiv", true);
    const { data, error } = await query;
    if (error) console.error("getFoerderprogramme error:", error);
    if (!data || !onboardingData) return data || [];
    // Client-side relevance scoring
    return data.map(function(p) {
      let score = 0;
      if (p.phasen && p.phasen.length > 0 && p.phasen.includes(onboardingData.phase)) score += 3;
      if (p.bundeslaender && p.bundeslaender.length > 0 && p.bundeslaender.includes(onboardingData.bundesland)) score += 2;
      else if (!p.bundeslaender || p.bundeslaender.length === 0) score += 1; // bundesweit
      if (p.branchen && p.branchen.length > 0 && p.branchen.includes(onboardingData.branche)) score += 2;
      else if (!p.branchen || p.branchen.length === 0) score += 1;
      return Object.assign({}, p, { relevance: score });
    }).sort(function(a, b) { return b.relevance - a.relevance; });
  },

  // Cockpit: Check-ins
  async saveCheckin(userId, weekStart, userText, aiFeedback) {
    const { error } = await supabase.from("cockpit_checkins").upsert({ user_id:userId, week_start:weekStart, user_text:userText, ai_feedback:aiFeedback }, { onConflict:"user_id,week_start" });
    if (error) console.error("saveCheckin error:", error);
  },
  async getCheckins(userId, limit) {
    const { data, error } = await supabase.from("cockpit_checkins").select("*").eq("user_id", userId).order("week_start", {ascending:false}).limit(limit||10);
    if (error) console.error("getCheckins error:", error);
    return data || [];
  },

  // Cockpit: KPIs
  async saveKPI(userId, period, data) {
    const { error } = await supabase.from("cockpit_kpis").upsert({ user_id:userId, period:period, period_type:"weekly", umsatz:data.umsatz||0, kunden:data.kunden||0, ausgaben:data.ausgaben||0, leads:data.leads||0 }, { onConflict:"user_id,period,period_type" });
    if (error) console.error("saveKPI error:", error);
  },
  async getKPIs(userId, limit) {
    const { data, error } = await supabase.from("cockpit_kpis").select("*").eq("user_id", userId).order("period", {ascending:true}).limit(limit||52);
    if (error) console.error("getKPIs error:", error);
    return data || [];
  },

  // Cockpit: Deadlines
  async getDeadlines(userId) {
    const { data, error } = await supabase.from("cockpit_deadlines").select("*").eq("user_id", userId).order("due_date", {ascending:true});
    if (error) console.error("getDeadlines error:", error);
    return data || [];
  },
  async saveDeadlines(userId, deadlines) {
    const rows = deadlines.map(function(d) { return Object.assign({}, d, { user_id:userId }); });
    const { error } = await supabase.from("cockpit_deadlines").insert(rows);
    if (error) console.error("saveDeadlines error:", error);
  },
  async toggleDeadline(userId, deadlineId, completed) {
    const { error } = await supabase.from("cockpit_deadlines").update({ completed:completed }).eq("id", deadlineId).eq("user_id", userId);
    if (error) console.error("toggleDeadline error:", error);
  }
};

// INTELLIGENT ROADMAP ENGINE (unchanged logic)
// ═══════════════════════════════════════════════════════════════

function generateIntelligentRoadmap(onboardingData) {
  if (!onboardingData || Object.keys(onboardingData).length === 0) return [];
  var tasks = [];
  var taskId = 0;
  var add = function(week, category, title, description, priority, effort, link, autoCheck) {
    var shouldAutoCheck = autoCheck ? autoCheck(onboardingData) : false;
    tasks.push({ id: "task_" + (taskId++), week: week, category: category, title: title,
      description: description, priority: priority, effort: effort, link: link, autoChecked: shouldAutoCheck });
  };
  add(1, "Unterlagen", "Businessplan anlegen", "Erstelle oder lade deinen vollständigen Businessplan hoch", "hoch", "1-2 h", "/dokumente", function(d) { return d.businessplan === true; });
  add(1, "Unterlagen", "Finanzplan erstellen", "Umsatz-, Kosten- und Liquiditätsplanung für 3 Jahre", "hoch", "1-2 h", "/dokumente", function(d) { return d.finanzplan === true; });
  add(1, "Markt & Produkt", "Konkurrenzanalyse dokumentieren", "Wer sind deine 3-5 Hauptwettbewerber?", "mittel", "30 min", "/dokumente", function(d) { return d.konkurrenz === true; });
  add(2, "Markt & Produkt", "Preisstrategie festlegen", "Dokumentiere deine Preisstrategie und Kalkulation", "mittel", "30 min", "/dokumente", function(d) { return d.preis === true; });
  add(2, "Markt & Produkt", "90-Tage-Ziele finalisieren", "Was willst du in den nächsten 3 Monaten erreichen?", "hoch", "30 min", "/dashboard", null);

  var isAlreadyFounded = onboardingData.phase === "gegruendet" || onboardingData.phase === "wachstum";
  var hasChosenLegalForm = onboardingData.rechtsform === true;
  if (!hasChosenLegalForm && !isAlreadyFounded) {
    add(2, "Recht & Gründung", "Rechtsform-Quiz durchführen", "Finde die passende Rechtsform: Einzelunternehmen, GbR, UG oder GmbH", "hoch", "10 min", "/gewerbeanmeldung", null);
  }
  if (isAlreadyFounded || hasChosenLegalForm) {
    add(3, "Recht & Gründung", "Gründungsdokumente prüfen", "Stelle sicher dass alle Gründungsunterlagen vorliegen", "mittel", "30 min", "/dokumente", null);
  }
  if (onboardingData.investoren === true || isAlreadyFounded) {
    add(3, "Recht & Gründung", "Notar-Vorbereitung starten", "Gesellschafterdaten, Firmennamen und Stammkapital zusammenstellen", "hoch", "1-2 h", "/gewerbeanmeldung", null);
  }
  add(3, "Recht & Gründung", "Gewerbeanmeldung vorbereiten", "Checkliste für Gewerbeamt durchgehen", "hoch", "30 min", "/gewerbeanmeldung", null);

  if (onboardingData.foerderungen !== false) {
    add(4, "Finanzierung & Förderung", "3 passende Förderprogramme shortlisten", "EXIST, KfW, Gründungszuschuss – was passt zu dir?", "hoch", "30 min", "/foerderprogramme", null);
    add(5, "Finanzierung & Förderung", "Unterlagen für Förderantrag sammeln", "Businessplan, Finanzplan, Nachweise komplett?", "hoch", "1-2 h", "/dokumente", null);
    add(6, "Finanzierung & Förderung", "Antragsschritte prüfen", "Fristen, Voraussetzungen und Kontakte klären", "mittel", "30 min", "/foerderprogramme", null);
  }
  if (onboardingData.investoren === true) {
    add(4, "Finanzierung & Förderung", "Pitch Deck erstellen", "10-15 Folien für Investorengespräche", "hoch", "1-2 h", "/dokumente", null);
    add(5, "Finanzierung & Förderung", "One-Pager erstellen", "Kompakte Übersicht auf einer Seite", "optional", "30 min", "/dokumente", null);
    add(7, "Finanzierung & Förderung", "Cap Table Grundstruktur", "Wie verteilen sich die Anteile?", "optional", "30 min", "/dokumente", null);
  }
  if (onboardingData.teamgroesse >= 2) {
    add(4, "Recht & Gründung", "Founder Agreement klären", "Rollen, Verantwortlichkeiten und Anteile schriftlich festhalten", "mittel", "1-2 h", "/dokumente", null);
  }
  var phase = onboardingData.phase || "idee";
  if (phase === "idee") add(5, "Markt & Produkt", "10 Problem-Interviews planen", "Validiere deine Idee durch Gespräche mit Zielkunden", "optional", "1-2 h", "/dashboard", null);
  if (phase === "validiert") add(6, "Markt & Produkt", "Preisannahmen testen", "Führe Zahlungsbereitschafts-Tests durch", "mittel", "1-2 h", "/dashboard", null);
  if (phase === "mvp") add(7, "Markt & Produkt", "MVP Launch-Checkliste", "Was muss vor dem Launch stehen?", "mittel", "30 min", "/dashboard", null);
  if (isAlreadyFounded) add(5, "Recht & Gründung", "Steuerliche Erfassung vorbereiten", "ELSTER-Zugang und Fragebogen zur steuerlichen Erfassung", "mittel", "30 min", "/gewerbeanmeldung", null);

  add(6, "Unterlagen", "Website / Impressum vorbereiten", "Rechtskonforme Website-Pflichtangaben erstellen", "mittel", "30 min", "/dokumente", null);
  add(7, "Unterlagen", "Datenschutzerklärung erstellen", "DSGVO-konforme Datenschutzerklärung für Website", "mittel", "30 min", "/dokumente", null);
  add(8, "Recht & Gründung", "Geschäftskonto eröffnen", "Trennung Privat/Geschäftlich – Bank auswählen", "hoch", "1-2 h", "/dashboard", null);
  add(9, "Unterlagen", "Alle Dokumente final prüfen", "Sind Businessplan, Finanzplan, Verträge aktuell?", "mittel", "30 min", "/dokumente", null);
  add(10, "Finanzierung & Förderung", "Förderanträge einreichen", "Alle vorbereiteten Anträge final absenden", "hoch", "1-2 h", "/foerderprogramme", null);
  add(11, "Markt & Produkt", "Erste Marketing-Maßnahmen planen", "Social Media, Website, Netzwerk – wie wirst du sichtbar?", "optional", "1-2 h", "/dashboard", null);
  add(12, "Markt & Produkt", "90-Tage-Review durchführen", "Was hast du geschafft? Was sind die nächsten Schritte?", "mittel", "30 min", "/dashboard", null);

  return tasks.sort(function(a, b) { return a.week - b.week; });
}

function calcRechtsformScores(answers) {
  var s = { einzelunternehmen: 0, gbr: 0, ug: 0, gmbh: 0 };
  if (answers[1]==="solo"){s.einzelunternehmen+=3;s.ug+=1}if(answers[1]==="zwei"){s.gbr+=3;s.ug+=2;s.gmbh+=1}if(answers[1]==="mehr"){s.gbr+=2;s.ug+=2;s.gmbh+=3}
  if(answers[2]==="hoch"){s.ug+=3;s.gmbh+=3}if(answers[2]==="mittel"){s.ug+=2;s.gbr+=1;s.einzelunternehmen+=1}if(answers[2]==="niedrig"){s.einzelunternehmen+=3;s.gbr+=2}
  if(answers[3]==="mini"){s.einzelunternehmen+=3;s.gbr+=2}if(answers[3]==="klein"){s.ug+=3;s.gbr+=1;s.einzelunternehmen+=1}if(answers[3]==="mittel"){s.ug+=2;s.gmbh+=2}if(answers[3]==="gross"){s.gmbh+=4;s.ug+=1}
  if(answers[4]==="klein"){s.einzelunternehmen+=3;s.gbr+=2}if(answers[4]==="mittel"){s.ug+=2;s.gbr+=1;s.einzelunternehmen+=1}if(answers[4]==="gross"){s.gmbh+=3;s.ug+=2}
  if(answers[5]==="ja"){s.gmbh+=4;s.ug+=1}if(answers[5]==="vielleicht"){s.ug+=2;s.gmbh+=2}if(answers[5]==="nein"){s.einzelunternehmen+=2;s.gbr+=2;s.ug+=1}
  if(answers[6]==="niedrig"){s.einzelunternehmen+=2;s.gbr+=2}if(answers[6]==="mittel"){s.ug+=2;s.gbr+=1}if(answers[6]==="hoch"){s.ug+=3;s.gmbh+=3}
  if(answers[7]==="hoch"){s.gmbh+=3;s.ug+=2}if(answers[7]==="mittel"){s.ug+=1;s.gbr+=1}if(answers[7]==="niedrig"){s.einzelunternehmen+=2;s.gbr+=1}
  if(answers[8]==="minimal"){s.einzelunternehmen+=3;s.gbr+=2}if(answers[8]==="egal"){s.ug+=1;s.gbr+=1;s.einzelunternehmen+=1}if(answers[8]==="ok"){s.gmbh+=2;s.ug+=2}
  return s;
}

const Dashboard = function({ userData, onNavigate }) {
  const { user } = useAuth();
  const [onboardingData, setOnboardingData] = useState(null);
  const [completedTasks, setCompletedTasks] = useState({});
  const [allTasks, setAllTasks] = useState([]);
  const [customTasks, setCustomTasks] = useState([]);
  const [loadingData, setLoadingData] = useState(true);
  const [aiGenerating, setAiGenerating] = useState(false);
  const [aiError, setAiError] = useState("");

  // Load data: onboarding + completed tasks + cached AI roadmap
  useEffect(function() {
    if (!user) return;
    (async function() {
      try {
        console.log("[Dashboard] Loading data for user:", user.id);
        var ob = await db.getOnboarding(user.id);
        var ct = await db.getCompletedTasks(user.id);
        setOnboardingData(ob);
        setCompletedTasks(ct);
        console.log("[Dashboard] Onboarding:", ob ? "loaded" : "none", "| Completed tasks:", Object.keys(ct).length);

        // Load custom tasks
        try {
          var userCustomTasks = await db.getCustomTasks(user.id);
          console.log("[Dashboard] Custom tasks loaded:", (userCustomTasks||[]).length);
          setCustomTasks(userCustomTasks || []);
        } catch(e) { console.error("[Dashboard] custom_tasks error:", e); }

        if (!ob || !ob.onboarding_complete) { setLoadingData(false); return; }

        // Try loading cached AI roadmap from DB
        var cachedTasks = null;
        try {
          cachedTasks = await db.getAiRoadmap(user.id);
          console.log("[Dashboard] Cached AI roadmap:", cachedTasks ? cachedTasks.length + " tasks" : "none");
        } catch(e) { console.error("[Dashboard] ai_roadmap error:", e); }

        if (cachedTasks && cachedTasks.length > 0) {
          setAllTasks(cachedTasks);
          setLoadingData(false);
          return;
        }

        // No cached roadmap — generate with AI
        console.log("[Dashboard] No cached roadmap — generating with AI...");
        setAiGenerating(true);
        try {
          var aiTasks = await callAiRoadmap(ob);
          if (aiTasks && aiTasks.length > 0) {
            setAllTasks(aiTasks);
            try { await db.saveAiRoadmap(user.id, aiTasks); console.log("[Dashboard] AI roadmap saved to DB"); } catch(e) { console.error("[Dashboard] Save error:", e); }
          } else {
            console.error("[Dashboard] AI returned 0 tasks");
            setAiError("KI hat keine Aufgaben generiert. Klicke auf 'Neu generieren'.");
          }
        } catch (err) {
          console.error("[Dashboard] AI generation error:", err);
          setAiError("Roadmap konnte nicht generiert werden: " + err.message);
        }
        setAiGenerating(false);
        setLoadingData(false);
      } catch(e) {
        console.error("[Dashboard] Fatal load error:", e);
        setLoadingData(false);
      }
    })();
  }, [user]);

  // AI roadmap generation via Edge Function
  async function callAiRoadmap(ob) {
    var session = await supabase.auth.getSession();
    var token = session?.data?.session?.access_token || SUPABASE_ANON_KEY;
    var payload = {
      pitch: ob.pitch || "", problem: ob.problem || "", zielgruppe: ob.zielgruppe || "",
      phase: ob.phase || "idee", branche: ob.branche || "", bundesland: ob.bundesland || "",
      teamgroesse: ob.teamgroesse || 1, kapitalbedarf: ob.kapitalbedarf || 50000,
      investoren: ob.investoren || false, rechtsform: ob.rechtsform || false,
      foerderungen: ob.foerderungen !== false, businessplan: ob.businessplan || false,
      finanzplan: ob.finanzplan || false, konkurrenz: ob.konkurrenz || false,
      preis: ob.preis || false, ziele: ob.ziele || ""
    };
    console.log("[AI Roadmap] Calling edge function with:", JSON.stringify(payload).substring(0, 200) + "...");
    console.log("[AI Roadmap] Using token:", token ? (token.substring(0, 20) + "...") : "NONE");
    var resp = await aiFetch(SUPABASE_URL + "/functions/v1/generate-roadmap", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token, "apikey": SUPABASE_ANON_KEY },
      body: JSON.stringify(payload)
    });
    console.log("[AI Roadmap] Response status:", resp.status);
    var text = await resp.text();
    console.log("[AI Roadmap] Response body:", text.substring(0, 500));
    var res;
    try { res = JSON.parse(text); } catch(e) { throw new Error("Ungültige Antwort von Edge Function: " + text.substring(0, 100)); }
    if (!resp.ok) throw new Error(res.error || "Edge Function Fehler (Status " + resp.status + ")");
    console.log("[AI Roadmap] Tasks received:", (res.tasks||[]).length);
    return res.tasks || [];
  }

  // Regenerate roadmap
  var handleRegenerate = async function() {
    if (!user || !onboardingData || aiGenerating) return;
    setAiGenerating(true);
    setAiError("");

        if (cached && cached.market_analysis) {
          setAnalysis(typeof cached.market_analysis === "string" ? JSON.parse(cached.market_analysis) : cached.market_analysis);
          setIsCached(true);

      } catch(e) { console.log("[Marktanalyse] No cached analysis"); }

  var handleGenerate = async function() {
    if (!user) return;
    setIsLoading(true); setError(""); setAnalysis(null); setIsCached(false);
    try {
      var ob = userData || await db.getOnboarding(user.id);
      var session = await supabase.auth.getSession();
      var token = session?.data?.session?.access_token || SUPABASE_ANON_KEY;
      console.log("[Marktanalyse] Generating analysis...");
      var resp = await aiFetch(SUPABASE_URL + "/functions/v1/market-analysis", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token, "apikey": SUPABASE_ANON_KEY },

      if (!resp.ok) throw new Error(res.error || "Fehler (Status " + resp.status + ")");

        if (saveRes.error) {
