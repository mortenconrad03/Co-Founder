<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoFounder AI</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#09090f;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
    #root{min-height:100vh}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:rgba(139,92,246,.4);border-radius:2px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .animate-spin{animation:spin 1s linear infinite}
    @keyframes floatOrb{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fadeIn{animation:fadeIn .35s ease forwards}
  </style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh">
    <div style="text-align:center">
      <div style="width:40px;height:40px;border:3px solid rgba(139,92,246,.3);border-top-color:#8b5cf6;border-radius:50%;margin:0 auto 12px;animation:spin 1s linear infinite"></div>
      <p style="color:rgba(255,255,255,.4);font-size:14px;font-family:sans-serif">Wird geladen...</p>
    </div>
  </div>
</div>
<script>
// Wait for all scripts to load
(function() {
  // Check if React loaded
  if (typeof React === 'undefined') {
    console.error('React not loaded - check internet connection');
    document.getElementById('root').innerHTML = 
      '<div style="color:white;padding:40px;text-align:center;font-family:sans-serif">' +
      '<h2>Keine Internetverbindung</h2>' +
      '<p style="color:rgba(255,255,255,.6);margin:20px 0">Bitte stelle sicher dass du mit dem Internet verbunden bist.</p>' +
      '<button onclick="location.reload()" style="padding:12px 28px;background:#8b5cf6;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">Erneut versuchen</button>' +
      '</div>';
    return;
  }

  const { useState, useEffect, useRef } = React;


// ═══════════════════════════════════════════════════════════════════
// INTELLIGENT ROADMAP ENGINE
// ═══════════════════════════════════════════════════════════════════

function generateIntelligentRoadmap(onboardingData) {
  if (!onboardingData || Object.keys(onboardingData).length === 0) return [];
  
  const tasks = [];
  let taskId = 0;
  
  const add = function(week, category, title, description, priority, effort, link, autoCheck) {
    const shouldAutoCheck = autoCheck ? autoCheck(onboardingData) : false;
    tasks.push({
      id: "task_" + (taskId++),
      week: week,
      category: category,
      title: title,
      description: description,
      priority: priority,
      effort: effort,
      link: link,
      autoChecked: shouldAutoCheck
    });
  };

  // WEEK 1-2: Foundation & Documents
  add(1, "Unterlagen", "Businessplan anlegen", "Erstelle oder lade deinen vollständigen Businessplan hoch", "hoch", "1-2 h", "/dokumente", function(d) { return d.businessplan === true; });
  add(1, "Unterlagen", "Finanzplan erstellen", "Umsatz-, Kosten- und Liquiditätsplanung für 3 Jahre", "hoch", "1-2 h", "/dokumente", function(d) { return d.finanzplan === true; });
  add(1, "Markt & Produkt", "Konkurrenzanalyse dokumentieren", "Wer sind deine 3-5 Hauptwettbewerber?", "mittel", "30 min", "/dokumente", function(d) { return d.konkurrenz === true; });
  add(2, "Markt & Produkt", "Preisstrategie festlegen", "Dokumentiere deine Preisstrategie und Kalkulation", "mittel", "30 min", "/dokumente", function(d) { return d.preis === true; });
  add(2, "Markt & Produkt", "90-Tage-Ziele finalisieren", "Was willst du in den nächsten 3 Monaten erreichen?", "hoch", "30 min", "/dashboard", null);

  // LEGAL FORM & REGISTRATION
  const isAlreadyFounded = onboardingData.phase === "gegruendet" || onboardingData.phase === "wachstum";
  const hasChosenLegalForm = onboardingData.rechtsform === true;
  
  if (!hasChosenLegalForm && !isAlreadyFounded) {
    add(2, "Recht & Gründung", "Rechtsform-Quiz durchführen", "Finde die passende Rechtsform: Einzelunternehmen, GbR, UG oder GmbH", "hoch", "10 min", "/gewerbeanmeldung", null);
  }
  
  if (isAlreadyFounded || hasChosenLegalForm) {
    add(3, "Recht & Gründung", "Gründungsdokumente prüfen", "Stelle sicher dass alle Gründungsunterlagen vorliegen", "mittel", "30 min", "/dokumente", null);
  }
  
  if (onboardingData.investoren === true || isAlreadyFounded) {
    add(3, "Recht & Gründung", "Notar-Vorbereitung starten", "Gesellschafterdaten, Firmennamen und Stammkapital zusammenstellen", "hoch", "1-2 h", "/gewerbeanmeldung", null);
  }
  
  add(3, "Recht & Gründung", "Gewerbeanmeldung vorbereiten", "Checkliste für Gewerbeamt durchgehen", "hoch", "30 min", "/gewerbeanmeldung", null);

  // FUNDING & FINANCING
  if (onboardingData.foerderungen !== false) {
    add(4, "Finanzierung & Förderung", "3 passende Förderprogramme shortlisten", "EXIST, KfW, Gründungszuschuss – was passt zu dir?", "hoch", "30 min", "/foerderprogramme", null);
    add(5, "Finanzierung & Förderung", "Unterlagen für Förderantrag sammeln", "Businessplan, Finanzplan, Nachweise komplett?", "hoch", "1-2 h", "/dokumente", null);
    add(6, "Finanzierung & Förderung", "Antragsschritte prüfen", "Fristen, Voraussetzungen und Kontakte klären", "mittel", "30 min", "/foerderprogramme", null);
  }
  
  if (onboardingData.investoren === true) {
    add(4, "Finanzierung & Förderung", "Pitch Deck erstellen", "10-15 Folien für Investorengespräche", "hoch", "1-2 h", "/dokumente", null);
    add(5, "Finanzierung & Förderung", "One-Pager erstellen", "Kompakte Übersicht auf einer Seite", "optional", "30 min", "/dokumente", null);
    add(7, "Finanzierung & Förderung", "Cap Table Grundstruktur", "Wie verteilen sich die Anteile?", "optional", "30 min", "/dokumente", null);
  }

  // TEAM
  if (onboardingData.teamgroesse >= 2) {
    add(4, "Recht & Gründung", "Founder Agreement klären", "Rollen, Verantwortlichkeiten und Anteile schriftlich festhalten", "mittel", "1-2 h", "/dokumente", null);
  }

  // PHASE-SPECIFIC TASKS
  const phase = onboardingData.phase || "idee";
  if (phase === "idee") {
    add(5, "Markt & Produkt", "10 Problem-Interviews planen", "Validiere deine Idee durch Gespräche mit Zielkunden", "optional", "1-2 h", "/dashboard", null);
  }
  if (phase === "validiert") {
    add(6, "Markt & Produkt", "Preisannahmen testen", "Führe Zahlungsbereitschafts-Tests durch", "mittel", "1-2 h", "/dashboard", null);
  }
  if (phase === "mvp") {
    add(7, "Markt & Produkt", "MVP Launch-Checkliste", "Was muss vor dem Launch stehen?", "mittel", "30 min", "/dashboard", null);
  }
  if (isAlreadyFounded) {
    add(5, "Recht & Gründung", "Steuerliche Erfassung vorbereiten", "ELSTER-Zugang und Fragebogen zur steuerlichen Erfassung", "mittel", "30 min", "/gewerbeanmeldung", null);
  }

  // WEEK 6-12: Execution & Finalization
  add(6, "Unterlagen", "Website / Impressum vorbereiten", "Rechtskonforme Website-Pflichtangaben erstellen", "mittel", "30 min", "/dokumente", null);
  add(7, "Unterlagen", "Datenschutzerklärung erstellen", "DSGVO-konforme Datenschutzerklärung für Website", "mittel", "30 min", "/dokumente", null);
  add(8, "Recht & Gründung", "Geschäftskonto eröffnen", "Trennung Privat/Geschäftlich – Bank auswählen", "hoch", "1-2 h", "/dashboard", null);
  add(9, "Unterlagen", "Alle Dokumente final prüfen", "Sind Businessplan, Finanzplan, Verträge aktuell?", "mittel", "30 min", "/dokumente", null);
  add(10, "Finanzierung & Förderung", "Förderanträge einreichen", "Alle vorbereiteten Anträge final absenden", "hoch", "1-2 h", "/foerderprogramme", null);
  add(11, "Markt & Produkt", "Erste Marketing-Maßnahmen planen", "Social Media, Website, Netzwerk – wie wirst du sichtbar?", "optional", "1-2 h", "/dashboard", null);
  add(12, "Markt & Produkt", "90-Tage-Review durchführen", "Was hast du geschafft? Was sind die nächsten Schritte?", "mittel", "30 min", "/dashboard", null);

  return tasks.sort(function(a, b) { return a.week - b.week; });
}

function calcRechtsformScores(answers) {
    // scores: { einzelunternehmen, gbr, ug, gmbh }
    const s = { einzelunternehmen: 0, gbr: 0, ug: 0, gmbh: 0 };
    // Q1: Gründeranzahl
    if (answers[1] === "solo") {
        s.einzelunternehmen += 3;
        s.ug += 1;
    }
    if (answers[1] === "zwei") {
        s.gbr += 3;
        s.ug += 2;
        s.gmbh += 1;
    }
    if (answers[1] === "mehr") {
        s.gbr += 2;
        s.ug += 2;
        s.gmbh += 3;
    }
    // Q2: Haftungsbeschränkung
    if (answers[2] === "hoch") {
        s.ug += 3;
        s.gmbh += 3;
    }
    if (answers[2] === "mittel") {
        s.ug += 2;
        s.gbr += 1;
        s.einzelunternehmen += 1;
    }
    if (answers[2] === "niedrig") {
        s.einzelunternehmen += 3;
        s.gbr += 2;
    }
    // Q3: Startkapital
    if (answers[3] === "mini") {
        s.einzelunternehmen += 3;
        s.gbr += 2;
    }
    if (answers[3] === "klein") {
        s.ug += 3;
        s.gbr += 1;
        s.einzelunternehmen += 1;
    }
    if (answers[3] === "mittel") {
        s.ug += 2;
        s.gmbh += 2;
    }
    if (answers[3] === "gross") {
        s.gmbh += 4;
        s.ug += 1;
    }
    // Q4: Umsatz
    if (answers[4] === "klein") {
        s.einzelunternehmen += 3;
        s.gbr += 2;
    }
    if (answers[4] === "mittel") {
        s.ug += 2;
        s.gbr += 1;
        s.einzelunternehmen += 1;
    }
    if (answers[4] === "gross") {
        s.gmbh += 3;
        s.ug += 2;
    }
    // Q5: Investoren
    if (answers[5] === "ja") {
        s.gmbh += 4;
        s.ug += 1;
    }
    if (answers[5] === "vielleicht") {
        s.ug += 2;
        s.gmbh += 2;
    }
    if (answers[5] === "nein") {
        s.einzelunternehmen += 2;
        s.gbr += 2;
        s.ug += 1;
    }
    // Q6: Risiko
    if (answers[6] === "niedrig") {
        s.einzelunternehmen += 2;
        s.gbr += 2;
    }
    if (answers[6] === "mittel") {
        s.ug += 2;
        s.gbr += 1;
    }
    if (answers[6] === "hoch") {
        s.ug += 3;
        s.gmbh += 3;
    }
    // Q7: Seriöser Auftritt
    if (answers[7] === "hoch") {
        s.gmbh += 3;
        s.ug += 2;
    }
    if (answers[7] === "mittel") {
        s.ug += 1;
        s.gbr += 1;
    }
    if (answers[7] === "niedrig") {
        s.einzelunternehmen += 2;
        s.gbr += 1;
    }
    // Q8: Bürokratie vermeiden
    if (answers[8] === "minimal") {
        s.einzelunternehmen += 3;
        s.gbr += 2;
    }
    if (answers[8] === "egal") {
        s.ug += 1;
        s.gbr += 1;
        s.einzelunternehmen += 1;
    }
    if (answers[8] === "ok") {
        s.gmbh += 2;
        s.ug += 2;
    }
    return s;
}

function getSuggestedDocTypes(userData) {
    const phase = userData?.phase || "idee";
    const teamSize = userData?.teamgroesse || 1;
    const investorsPlanned = userData?.investoren || false;
    const fundingWanted = userData?.foerderungen !== false;
    return DOCUMENT_TYPES.map(dt => {
        let score = dt.priority;
        dt.rules.forEach(rule => {
            if (rule === "investorsPlanned" && investorsPlanned)

                score += 5;
